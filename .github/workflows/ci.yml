name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . black ruff mypy

      - name: Check formatting with black
        run: black --check --diff src examples

      - name: Lint with ruff
        run: ruff check src examples

      - name: Type check with mypy
        run: mypy src examples

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-cov build

      - name: Smoke test package import
        run: |
          python -m build --sdist --wheel
          python -c "import wechat_clawbot; print(wechat_clawbot.__version__)"

      - name: Run tests
        if: ${{ hashFiles('tests/**/*.py') != '' }}
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        if: ${{ matrix.python-version == '3.12' && hashFiles('tests/**/*.py') != '' }}
        run: pytest tests/ --cov=wechat_clawbot --cov-report=xml --cov-report=term

      - name: No tests present
        if: ${{ hashFiles('tests/**/*.py') == '' }}
        run: echo "No tests/ directory found; smoke checks completed instead."

      - name: Upload coverage to Codecov
        if: ${{ matrix.python-version == '3.12' && hashFiles('tests/**/*.py') != '' }}
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}