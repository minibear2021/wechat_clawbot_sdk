name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Verify local install from built artifacts
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -c "import wechat_clawbot; print(wechat_clawbot.__version__)"

      - name: Publish to TestPyPI
        if: startsWith(github.ref, 'refs/tags/') && env.TEST_PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ env.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      - name: Wait for TestPyPI package availability
        if: startsWith(github.ref, 'refs/tags/') && env.TEST_PYPI_API_TOKEN != ''
        run: |
          echo "Waiting 30 seconds for TestPyPI to process the package..."
          sleep 30

      - name: Test install from TestPyPI
        if: startsWith(github.ref, 'refs/tags/') && env.TEST_PYPI_API_TOKEN != ''
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${PACKAGE_VERSION#v}"
          python -m pip install --upgrade --force-reinstall --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "wechat-clawbot==${VERSION}"
          python -c "import wechat_clawbot; print(wechat_clawbot.__version__)"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/') && env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}